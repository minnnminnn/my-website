<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      text-align: center;
      color: red;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Employee Login</h2>

  <input type="text" id="empId" placeholder="Employee ID">
  <input type="text" id="empName" placeholder="Employee Name">

  <button onclick="login()">Login</button>

  <div class="msg" id="msg"></div>
</div>

<script>
  function login() {
    const id = document.getElementById("empId").value;
    const name = document.getElementById("empName").value;

    // FAKE VALIDATION (demo only)
    if (id === "1001" && name === "Ali") {
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("msg").innerText = "Invalid login!";
    }
  }
</script>

</body>
</html>
